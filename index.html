<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodhago — Books at your door</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0f0e;
    --ink-2: #3a3935;
    --ink-3: #7a7870;
    --paper: #faf8f4;
    --paper-2: #f2ede6;
    --paper-3: #e8e0d5;
    --saffron: #e8620a;
    --saffron-light: #fdf0e8;
    --saffron-dark: #b34a06;
    --indigo: #1e3a6e;
    --indigo-light: #e8edf7;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 20px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Georgia', serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(250, 248, 244, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--paper-3);
    padding: 0 6%;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .nav-logo {
    font-family: 'Georgia', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: -0.5px;
  }

  .nav-logo span { color: var(--saffron); }

  .nav-links {
    display: flex; gap: 32px; list-style: none;
  }

  .nav-links a {
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-2);
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: color 0.15s;
  }

  .nav-links a:hover { color: var(--saffron); }

  .nav-cta {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
    text-decoration: none;
  }

  .nav-cta:hover { background: var(--ink-2); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    padding: 120px 6% 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--saffron-light);
    color: var(--saffron-dark);
    border: 1px solid #f0c4a0;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 28px;
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--saffron);
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .hero-headline {
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1.5px;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .hero-headline em {
    font-style: normal;
    color: var(--saffron);
  }

  .hero-sub {
    font-family: Arial, sans-serif;
    font-size: 17px;
    color: var(--ink-2);
    line-height: 1.65;
    max-width: 460px;
    margin-bottom: 40px;
  }

  .search-wrap {
    display: flex;
    background: #fff;
    border: 1.5px solid var(--paper-3);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    max-width: 520px;
  }

  .search-wrap:focus-within {
    border-color: var(--saffron);
    box-shadow: 0 0 0 3px rgba(232,98,10,0.12);
  }

  .search-wrap input {
    flex: 1;
    font-family: Arial, sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 18px;
  }
